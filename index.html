<style>
  :root {
    --steel: #1a2332;
    --steel-mid: #243044;
    --steel-light: #2e3d52;
    --accent: #f5a623;
    --accent-dim: #c4841a;
    --text: #e8edf2;
    --text-dim: #8a9ab0;
    --success: #3dd68c;
    --check-color: #60a5fa;
    --fedex: #9b59b6;
    --border: rgba(255,255,255,0.08);
    --card: rgba(255,255,255,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--steel);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
  }
  header {
    background: var(--steel-mid);
    border-bottom: 3px solid var(--accent);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .logo-mark {
    width: 42px; height: 42px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 20px;
    color: var(--steel); flex-shrink: 0;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }
  .header-text h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--text); line-height: 1;
  }
  .header-text p { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .refresh-time { margin-left: auto; font-size: 11px; color: var(--text-dim); text-align: right; }
  .refresh-time strong { color: var(--accent); display: block; font-size: 12px; }
  .main { max-width: 900px; margin: 0 auto; padding: 28px 20px; }
  .search-panel {
    background: var(--steel-mid);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 24px;
    margin-bottom: 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .search-panel h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 18px;
  }
  .search-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 14px; align-items: end;
  }
  @media (max-width: 600px) { .search-row { grid-template-columns: 1fr; } }
  .field-group label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 8px;
  }
  .search-input-wrap { position: relative; }
  .search-input-wrap input,
  .search-input-wrap select {
    width: 100%;
    background: var(--steel);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px;
    color: var(--text);
    font-family: 'Barlow', sans-serif; font-size: 15px;
    outline: none; transition: border-color 0.2s; appearance: none;
  }
  .search-input-wrap input:focus,
  .search-input-wrap select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(245,166,35,0.15);
  }
  .dropdown-list {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--steel-light);
    border: 1px solid var(--accent); border-radius: 8px;
    max-height: 240px; overflow-y: auto; z-index: 200;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .dropdown-list div {
    padding: 10px 16px; font-size: 14px; cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .dropdown-list div:last-child { border-bottom: none; }
  .dropdown-list div:hover { background: rgba(245,166,35,0.12); color: var(--accent); }
  .lookup-btn {
    background: var(--accent); color: var(--steel);
    border: none; border-radius: 8px; padding: 12px 28px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap;
  }
  .lookup-btn:hover { background: var(--accent-dim); }
  .lookup-btn:active { transform: scale(0.97); }
  .results-section { display: none; }
  .results-section.visible { display: block; }
  .employee-header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 20px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .emp-avatar {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700;
    color: var(--steel); flex-shrink: 0;
  }
  .emp-info h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 700; }
  .emp-info p { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .week-badge {
    margin-left: auto;
    background: var(--steel-light); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 16px; text-align: center;
  }
  .week-badge span { display: block; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 2px; }
  .week-badge strong { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; color: var(--accent); }
  .summary-cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin-bottom: 20px;
  }
  .summary-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px; position: relative; overflow: hidden;
  }
  .summary-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent);
  }
  .summary-card .card-label {
    font-size: 10px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;
  }
  .summary-card .card-value {
    font-family: 'Barlow Condensed', sans-serif; font-size: 28px;
    font-weight: 600; color: var(--accent); line-height: 1;
  }
  .summary-card .card-sub { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
  .section-label {
    font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
    font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 12px; margin-top: 24px;
  }
  .check-card {
    background: var(--steel-mid); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px; margin-bottom: 12px;
    border-left: 4px solid var(--accent);
  }
  .check-card.direct-deposit { border-left-color: var(--success); }
  .check-card.usps { border-left-color: var(--check-color); }
  .check-card.fedex { border-left-color: var(--fedex); }
  .check-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
  }
  .check-amount {
    font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700;
  }
  .check-amount.dd { color: var(--success); }
  .check-amount.usps { color: var(--check-color); }
  .check-amount.fedex { color: var(--fedex); }
  .sent-via-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
  }
  .sent-via-badge.dd { background: rgba(61,214,140,0.15); color: var(--success); border: 1px solid rgba(61,214,140,0.3); }
  .sent-via-badge.usps { background: rgba(96,165,250,0.15); color: var(--check-color); border: 1px solid rgba(96,165,250,0.3); }
  .sent-via-badge.fedex { background: rgba(155,89,182,0.15); color: var(--fedex); border: 1px solid rgba(155,89,182,0.3); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .check-details {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .detail-item { background: var(--steel); padding: 12px 16px; }
  .detail-item .d-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px;
  }
  .detail-item .d-value { font-size: 15px; font-weight: 500; }
  .no-results { text-align: center; padding: 48px 20px; color: var(--text-dim); }
  .no-results .icon { font-size: 48px; margin-bottom: 12px; }
  .no-results p { font-size: 16px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--steel); }
  ::-webkit-scrollbar-thumb { background: var(--steel-light); border-radius: 3px; }
  select option { background: var(--steel-mid); color: var(--text); }
</style>

let selectedEmp = null;

const empSearch = document.getElementById('empSearch');
const empDropdown = document.getElementById('empDropdown');

empSearch.addEventListener('input', () => {
  const q = empSearch.value.toLowerCase().trim();
  selectedEmp = null;

  if (!q) {
    empDropdown.style.display = 'none';
    return;
  }

  const matches = EMPLOYEES.filter(e => e.name.toLowerCase().includes(q)).slice(0, 50);

  if (!matches.length) {
    empDropdown.style.display = 'none';
    return;
  }

  empDropdown.innerHTML = matches.map(e =>
    `<div onclick="selectEmp('${e.id}', '${e.name.replace(/'/g, "\\'")}')">
      ${e.name}
    </div>`
  ).join('');

  empDropdown.style.display = 'block';
});

empSearch.addEventListener('focus', () => {
  if (empSearch.value.trim().length > 0) empSearch.dispatchEvent(new Event('input'));
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-input-wrap')) empDropdown.style.display = 'none';
});

function selectEmp(id, name) {
  selectedEmp = { id, name };
  empSearch.value = name;
  empDropdown.style.display = 'none';
}

function badgeClass(sentVia) {
  if (sentVia === 'Direct Deposit') return 'dd';
  if (sentVia === 'FedEx') return 'fedex';
  return 'usps';
}

function amountClass(sentVia) {
  if (sentVia === 'Direct Deposit') return 'dd';
  if (sentVia === 'FedEx') return 'fedex';
  return 'usps';
}

function cardClass(sentVia) {
  if (sentVia === 'Direct Deposit') return 'direct-deposit';
  if (sentVia === 'FedEx') return 'fedex';
  return 'usps';
}

function lookup() {
  const week = document.getElementById('weekSelect').value;
  const weekLabel = document.getElementById('weekSelect').selectedOptions[0].text;
  const resultsEl = document.getElementById('results');
  resultsEl.classList.add('visible');

  if (!selectedEmp || !week) {
    resultsEl.innerHTML = `<div class="no-results"><div class="icon">🔍</div><p>Please select an employee and a week ending date.</p></div>`;
    return;
  }

  const key = selectedEmp.id + '|' + week;
  const records = PAY_RECORDS[key];

  if (!records || records.length === 0) {
    resultsEl.innerHTML = `<div class="no-results"><div class="icon">📭</div><p>No pay records found for <strong>${selectedEmp.name}</strong> for the week ending <strong>${weekLabel}</strong>.</p></div>`;
    return;
  }

  const totalReg = records.reduce((s, r) => s + r.regular_hours, 0);
  const totalOT = records.reduce((s, r) => s + r.overtime_hours, 0);
  const initials = selectedEmp.name.split(',').map(p => p.trim()[0] || '').join('');

  const checkCards = records.map(r => `
    <div class="check-card ${cardClass(r.sent_via)}">
      <div class="check-top">
        <div class="check-amount ${amountClass(r.sent_via)}">Payment Issued</div>
        <div class="sent-via-badge ${badgeClass(r.sent_via)}">
          <span class="dot"></span> ${r.sent_via}
        </div>
      </div>
      <div class="check-details">
        <div class="detail-item">
          <div class="d-label">Check / Ref No.</div>
          <div class="d-value">${r.check_no && r.check_no !== '—' ? '***' + r.check_no.slice(-2) : '—'}</div>
        </div>
        <div class="detail-item">
          <div class="d-label">Date Cut</div>
          <div class="d-value">${r.check_date}</div>
        </div>
        <div class="detail-item">
          <div class="d-label">Date Sent</div>
          <div class="d-value">${r.check_date}</div>
        </div>
        <div class="detail-item">
          <div class="d-label">Regular Hours</div>
          <div class="d-value">${r.regular_hours} hrs</div>
        </div>
        <div class="detail-item">
          <div class="d-label">Overtime Hours</div>
          <div class="d-value">${r.overtime_hours} hrs</div>
        </div>
      </div>
    </div>
  `).join('');

  resultsEl.innerHTML = `
    <div class="employee-header">
      <div class="emp-avatar">${initials}</div>
      <div class="emp-info">
        <h3>${selectedEmp.name}</h3>
        <p>ID: ${selectedEmp.id}</p>
      </div>
      <div class="week-badge">
        <span>Week Ending</span>
        <strong>${weekLabel}</strong>
      </div>
    </div>

    <div class="summary-cards">
      <div class="summary-card">
        <div class="card-label">Payments</div>
        <div class="card-value">${records.length}</div>
        <div class="card-sub">issued this week</div>
      </div>
      <div class="summary-card">
        <div class="card-label">Regular Hours</div>
        <div class="card-value">${totalReg}<span style="font-size:16px;color:var(--text-dim)"> hrs</span></div>
      </div>
      <div class="summary-card">
        <div class="card-label">Overtime Hours</div>
        <div class="card-value">${totalOT}<span style="font-size:16px;color:var(--text-dim)"> hrs</span></div>
      </div>
      <div class="summary-card">
        <div class="card-label">Total Hours</div>
        <div class="card-value">${totalReg + totalOT}<span style="font-size:16px;color:var(--text-dim)"> hrs</span></div>
      </div>
    </div>

    ${records.length > 1 ? '<div class="section-label">Payment Breakdown</div>' : ''}
    ${checkCards}
  `;
}
</script>
</body>
</html>
